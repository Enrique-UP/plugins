<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Async / Await Modern Standard</title>
    <style>
        body { font-family: sans-serif; background: #f4f6f9; padding: 20px; }
        h1, h3 { text-align: center; }
        .cards-container { display: grid; grid-template-columns: repeat(auto-fill, minmax(250px, 1fr)); gap: 20px; max-width: 1200px; margin: auto; }
        .card { background: #fff; border-radius: 10px; padding: 15px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); display: flex; flex-direction: column; justify-content: space-between; }
        .card img { width: 100%; height: 150px; object-fit: contain; }
        .price { font-size: 18px; font-weight: bold; color: #2575fc; margin: 10px 0; }
        button { background: #2575fc; color: white; border: none; padding: 8px; border-radius: 5px; cursor: pointer; width: 100%; }
        .status-message { text-align: center; font-size: 20px; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

    <h1>Async / Await (The Modern Standard)</h1>
    <h3>Promises States: Pending, Fulfilled, and Rejected</h3>

    <div id="products-grid" class="cards-container">
        <div id="status" class="status-message" style="color: #666;">Pending... Data aa raha hai, please wait.</div>
    </div>

    <script>
        const grid = document.getElementById('products-grid');

        // Modern Standard: Async function banaya
        async function displayProducts() {
            try {
                // 1. API Call Shuru (Yahan data aane tak status 'Pending' hi rahega)
                const response = await fetch('https://fakestoreapi.com/products');
                
                // Agar response code 200 nahi hai to seedhe catch block (Rejected) mein bhej do
                if (!response.ok) {
                    throw new Error("Server se sahi response nahi mila!");
                }

                // 2. Response ko JSON mein badla (Await kiya)
                const products = await response.json();

                // 3. FULFILLED STATE: Agar control yahan tak pahuncha, matlab promise fulfill ho gaya
                grid.innerHTML = products.map(p => `
                    <div class="card">
                        <img src="${p.image}" alt="${p.title}">
                        <div style="font-weight:600; margin-top:10px;">${p.title.slice(0, 40)}...</div>
                        <div class="price">$${p.price}</div>
                        <button>Buy Now</button>
                    </div>
                `).join('');

            } catch (error) {
                // 4. REJECTED STATE: Agar internet band ho, URL galat ho, ya API fail ho jaye
                console.error("Error occurred:", error);
                grid.innerHTML = `<div class="status-message" style="color: red;">Rejected! Error: ${error.message}</div>`;
            }
        }

        // Function ko call kiya page load hone par
        displayProducts();
    </script>

</body>
</html>
