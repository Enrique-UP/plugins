    <script src="https://code.jquery.com/jquery-3.6.0.min.js"></script>

<script>
    $(document).ready(function () {
        const $table = $(".tableArrow");

        const originalRows = $table.find("tr").slice(1).map(function () {
            return $(this).clone(true)[0];
        }).get();

        let sortedColumn = -1;
        let isSorted = false;

        $table.on("click", "tr th span i", function () {
            const columnIndex = $(this).closest("th").index();
            sortTable(columnIndex);
        });

        function sortTable(columnIndex) {
            let $rows = $table.find("tr").slice(1);

            if (sortedColumn === columnIndex && isSorted) {
                $rows.remove();

                $.each(originalRows, function (index, row) {
                    $table.append($(row).clone(true));
                });

                isSorted = false;
                sortedColumn = -1;
            } else {
                let rowsArray = $rows.get();

                rowsArray.sort(function (a, b) {
                    let x = $(a).find("td").eq(columnIndex).text().trim();
                    let y = $(b).find("td").eq(columnIndex).text().trim();

                    let numX = parseFloat(x.replace('%', ''));
                    let numY = parseFloat(y.replace('%', ''));

                    if (!isNaN(numX) && !isNaN(numY)) {
                        return numX - numY;
                    }

                    return x.localeCompare(y);
                });

                $.each(rowsArray, function (index, row) {
                    $table.append(row);
                });

                isSorted = true;
                sortedColumn = columnIndex;
            }
        }
    });
</script>
