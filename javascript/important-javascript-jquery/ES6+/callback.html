<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function fetchUser(userId, callback) {
            setTimeout(() => {
                const user = { id: userId, name: "Enrique" };
                callback(user);
            }, 2000);
        }
        fetchUser(1, (user) => {
            console.log(user.id, user.name);
        });
    </script>
</body>
</html>
