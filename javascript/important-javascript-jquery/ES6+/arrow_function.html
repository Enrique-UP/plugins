<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        // before arrow function
        const hello1 = function() {return "Hello World!";}
        document.write(hello1());
        document.write("<br><br>");
    </script>
    <script>
        const multiply = (a, b) => a * b;
        document.write(multiply(4, 5));

        document.write("<br><br>");

        const hello2 = () => "Hello World!";
        document.write(hello2());

        document.write("<br><br>");

        const hello3 = (val) => "Hello " + val; 
        document.write(hello3("World"));

        document.write("<br><br>");
        const hello4 = val => "Hello " + val; 
        document.write(hello4("Universe"));

        document.write("<br><br>");
        const hello5 = () => "Hello World!";
        document.write(hello5());
    </script>
    <script>
        // before arrow function
        document.write("<br><br>");
        const person = {
            name: "John",
            greet: function() {
                return this.name;
            }
        };
        document.write(person.greet());
        document.write("<br><br>");
        const person1 = {
            name: "Johns",
            greet: () => {
                return this.name;
            }
        };
        document.write(person1.greet());
        // this method will not be work here.
        // 'this' does NOT point to person1.
        // 'this' points to the global 'window' object!
        document.write("<br><br>");
    </script>
</body>
</html>
