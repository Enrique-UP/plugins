<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        function fetchUser(userId) {
            return new Promise((resolve) => {
                setTimeout(() => resolve({ id: userId, name: "Enrique" }), 2000);
            });
        }

        // Using Async/Await with try/catch for errors
        async function displayUser() {
            try {
                console.log("Fetching...");
                const user = await fetchUser(1); // Pauses here until promise resolves
                console.log(user.name);          // Outputs: Enrique
            } catch (error) {
                console.error("Error:", error);
            }
        }
        displayUser();
    </script>
    <script>
        // Fetching data from a live test API
        async function getTodoData() {
            try {
                const response = await fetch('https://jsonplaceholder.typicode.com/todos/1');
                const data = await response.json(); // Converts raw response to JSON object
                console.log(data);
            } catch (error) {
                console.error("Could not fetch data:", error);
            }
        }
        getTodoData();
    </script>
</body>
</html>
