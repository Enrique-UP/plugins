<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body>
    <script>
        // 1. Array Destructuring
            // Without Destructuring
            const colors = ["red", "green", "blue"];
            const first = colors[0];
            const second = colors[1];
            console.log(first);  // red
            console.log(second); // green
            console.log("========================================");
        

            // With Destructuring
            const colors1 = ["red", "green", "blue"];
            const [first1, second1] = colors1;
            console.log(first1);  // red
            console.log(second1); // green
            console.log("========================================");


        // 2. Skipping Values
            const numbers = [10, 20, 30, 40];
            const [first2, , third2] = numbers;
            console.log(first2); // 10
            console.log(third2); // 30
            console.log("========================================");

        
        // 3. Default Values
            const [a, b = 100] = [10];
            console.log(a); // 10
            console.log(b); // 100
            console.log("========================================");


        // 4. Rest Operator
            const [first3, ...rest] = [1, 2, 3, 4, 5];
            console.log(first3); // 1
            console.log(rest);  // [2, 3, 4, 5]
            console.log("========================================");


        // 5. Swapping Variables
            let x = 10;
            let y = 20;
            [x, y] = [y, x];
            console.log(x); // 20
            console.log(y); // 10
            console.log("========================================");


        // 6. Object Destructuring
            const user = {
                name: "Nomaan",
                age: 34,
                city: "Gurgaon"
            };
            const { name, age } = user;
            console.log(name); // Nomaan
            console.log(age);  // 34
            console.log("========================================");


        // 7. Renaming Variables
            const user1 = {
                name: "Nomaan",
                age: 34
            };
            const { name: userName, age: userAge } = user1;
            console.log(userName); // Nomaan
            console.log(userAge);  // 34
        console.log("========================================");
        

        // 8. Default Values in Objects
        const user2 = {
            name1: "Nomaan"
        };
        const { name1, age1 = 25 } = user2;
        console.log(name1); // Nomaan
        console.log(age1);  // 25
        console.log("========================================");


        // 9. Nested Object Destructuring
        const employee = {
            id: 101,
            address: {
                city: "Gurugram",
                state: "Haryana"
            }
        };
        const {
            address: { city, state }
        } = employee;
        console.log(city);  // Gurugram
        console.log(state); // Haryana
        console.log("========================================");

        
        // 10. Function Parameter Destructuring
        function displayUser({ name, age }) {
            console.log(`${name} is ${age} years old`);
        }
        const user3 = {
            name: "Nomaan",
            age: 34
        };
        displayUser(user3);
        console.log("========================================");

            department: "IT",
            salary3: 50000
        };
