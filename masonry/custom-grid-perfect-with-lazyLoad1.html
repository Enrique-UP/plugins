<style type="text/css">
    * {padding: 0;margin: 0;box-sizing: border-box;}
    body {font-family: 'Open Sans Condensed', sans-serif;font-size: 1rem;text-rendering: optimizeLegibility;-webkit-font-smoothing: antialiased;line-height: 1.7;background: brown;counter-reset: section;}
    .partition {
        display: grid;
        grid-column-gap: 16px;
        grid-template-columns: repeat(5, 1fr);
        /* grid-auto-rows: 20px; */
        /* display: flex;flex-direction: column;
        row-gap: 32px; */
    }
    .partition data {width: 100%;
        grid-row-end: span var(--num);
        margin-bottom: 16px;
    }
    .partition data figure{background-color: #fff;flex-direction: column;}
    .partition data figcaption{padding: 12px;flex-direction: column;}
    
    .partition data figure, .partition data figcaption{width: 100%;display: flex;}
    .partition data figcaption{row-gap: 4px;}
    .partition img {width: 100%;}
    .partition data figcaption b::before{counter-increment: section;content: " " counter(section) ":- ";}
</style>
<script>
    if (!!window.IntersectionObserver) {
      let observer = new IntersectionObserver((entries, observer) => {
        entries.forEach(entry => {
          if (entry.isIntersecting) {
            console.log(entry);
            entry.target.src = entry.target.dataset.src;
            entry.target.removeAttribute("data-src");
            observer.unobserve(entry.target);
          }
        });
      }, { rootMargin: "0px 0px 0px 0px" });
      document.querySelectorAll('img[data-src]').forEach(img => { 
        observer.observe(img) 
      });
    }
    else alert("This API is not supported by your browser, so you can't see the effect.");

    function resizeImage(){
        document.querySelectorAll(".partition data").forEach(function(e){
            const h = e.querySelector("figure").getBoundingClientRect().height;
            const style = window.getComputedStyle(e);
            const marginBottom = parseFloat(style.marginBottom);
            e.style.setProperty("--num", parseInt(h + marginBottom));
        });
    }
    window.addEventListener("load", resizeImage);
    window.addEventListener("resize", resizeImage);
    document.querySelectorAll(".partition img").forEach(img => img.addEventListener("load", resizeImage));
</script>
