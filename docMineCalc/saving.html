<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Saving & Target</title>
  <!-- Data -->
  <script>
    const totalOf = (str) => str.split('+').map(v => Number(v.replace(/,/g, '').trim())).reduce((a, b) => a + b, 0);
    const formatdeposit = (deposit) => `${deposit} = <b>${totalOf(deposit).toLocaleString()}</b>`;
    const formatNumber = (num) => `<b>${num.toLocaleString()}</b>`;

    const entries = [
      {
        date: '10-Jun-2026',
        deposit: '800,000 + 586,000 + 500,000 + 180,000 + 270,000',
        spend: '150,000',
        target: '21,66,000'
      },
      {
        date: '10-Jul-2026',
        deposit: '',
        spend: '',
        target: ''
      },
      {
        date: '10-Aug-2026',
        deposit: '',
        spend: '',
        target: ''
      },
      {
        date: '10-Sep-2026',
        deposit: '',
        spend: '',
        target: ''
      },
      {
        date: '10-Oct-2026',
        deposit: '',
        spend: '',
        target: ''
      },
      {
        date: '10-Nov-2026',
        deposit: '',
        spend: '',
        target: ''
      },
      {
        date: '10-Dec-2026',
        deposit: '',
        spend: '',
        target: ''
      },
    ];

    const data = entries.map(item => {
      const inHandTotal = totalOf(item.deposit);
      const spendTotal = item.spend ? totalOf(item.spend) : '';
      const leftTotal = inHandTotal - spendTotal;

      return {
        ...item,
        inHand: formatdeposit(item.deposit),
        spend: item.spend ? formatdeposit(item.spend) : '',
        left: formatNumber(leftTotal)
      };
    });
  </script>
  <!-- Data -->
  


  <style type="text/css">
    *{padding:0;margin:0;box-sizing: border-box;}
    body{font-family: Arial, Helvetica, sans-serif;font-size: 14px;line-height: 1.3;padding-top: 50px;}
    table{border:1px solid #000;width: 100%;margin-inline:auto;border-collapse: collapse;max-width: 1200px;}
    table.mb{margin-bottom: 4px;}
    table:not(.mb){margin-bottom: 50px;}
    table thead td{white-space: nowrap;}
    table caption, table th, table td{border:1px solid #000;}
	table caption, table thead td{padding:6px 4px;}
	table tbody td{padding:4px;}
    table caption {display: table-caption;caption-side: bottom;text-align: center;border-top: none;font-weight: bold;color:#fff;font-size: 16px;}
    table thead td, table tfoot td{font-weight: bold;color:#fff;font-size: 16px;}

    table thead td{background: #00695C;}
    table thead td:nth-child(1){width:8%;}
    table thead td:nth-child(2){width:38%;}
    table thead td:nth-child(3){width:38%;}
    table thead td:nth-child(4){width:8%;}
    table thead td:nth-child(5){width:8%;}
    table caption{background: #4682B4;}
    table tfoot td{background: #5D4037;}
    table tbody ~ tfoot td{background: #0F172A ;}
    .totalTable tfoot:only-child td{background: #4A4A4A;}

    table ol, table ul{padding-left: 16px;}
    table tbody td:nth-child(3){word-break: break-all;}

    .btns{display: flex;justify-content: center;text-align: center;}
    .btns > a{text-decoration: none;background:brown;color:#fff;padding: 12px 24px;font-weight: bold;border-radius: 4px;}
    
    table caption:only-child { border-top: 1px solid #000; }
    table tbody td:nth-child(1) {background-color: #fff9c4;white-space:nowrap;}
    table tbody td:nth-child(2) {background-color: #e8f5e9;}
    table tbody td:nth-child(5) {background-color: #f3e5f5;}
    table tbody td:nth-child(3), table tbody td:nth-child(7) {background-color: #fde0e0;}
    table tbody td:nth-child(4), table tbody td:nth-child(6) {background-color: #e0f7fa;}
  </style>
</head>
<body>
  <table class="table">
    <thead>
      <tr>
        <td>Set Date</td>
        <td>Only edit in 10 of every month</td>
        <td>Always Edit</td>
        <td>Edit on 10</td>
        <td>Automatically Set</td>
      </tr>
    </thead>
	<thead>
      <tr>
        <td>Date</td>
        <td>How in Hand</td>
        <td>How Spend of total month</td>
        <td>Target Saving</td>
        <td>Total Left</td>
      </tr>
    </thead>
    <tbody id="tableBody"></tbody>
  </table>

  <table class="totalTable">
    <caption>Updated Date Here...</caption>
  </table>
  
  <script>
    data.forEach(item => {
      const row = document.createElement("tr");
      row.innerHTML = `
        <td>${item.date}</td>
        <td>${item.inHand}</td>
        <td>${item.spend}</td>
        <td>${item.target}</td>
        <td>${item.left}</td>
      `;
      document.getElementById("tableBody").appendChild(row);
    });
  </script>
  <!-- Last Modify -->
  <script>
    const modifiedDate = new Date(document.lastModified);
    const day = String(modifiedDate.getDate()).padStart(2, '0');
    const month = String(modifiedDate.getMonth() + 1).padStart(2, '0');
    const year = modifiedDate.getFullYear();
    const formattedDate = `${day}-${month}-${year}`;
    document.querySelector("caption").textContent = formattedDate;
  </script>
</body>
</html>
